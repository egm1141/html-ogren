<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HTML Duo — HTML Öğrenmenin En Eğlenceli Yolu!</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap');

  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

  :root{
    --duo-green:#58cc02;
    --duo-green-dark:#46a302;
    --duo-green-light:#d7ffb8;
    --duo-blue:#1cb0f6;
    --duo-blue-dark:#1899d6;
    --duo-blue-light:#ddf4ff;
    --duo-purple:#ce82ff;
    --duo-purple-dark:#a568cc;
    --duo-red:#ff4b4b;
    --duo-red-dark:#ea2b2b;
    --duo-orange:#ff9600;
    --duo-orange-dark:#cd7b00;
    --duo-yellow:#ffc800;
    --duo-bg:#131f24;
    --duo-card:#1a2e35;
    --duo-card-border:#2b4550;
    --duo-text:#ffffff;
    --duo-text-dim:#93b0be;
    --duo-surface:#ffffff;
    --duo-shadow:rgba(0,0,0,.35);
    --radius:16px;
    --radius-sm:12px;
  }

  html{font-size:16px;scroll-behavior:smooth}
  body{
    font-family:'Nunito',sans-serif;
    background:var(--duo-bg);
    color:var(--duo-text);
    min-height:100vh;
    overflow-x:hidden;
  }

  /* ─── TOP NAV / PROGRESS ─── */
  .top-bar{
    position:sticky;top:0;z-index:100;
    background:var(--duo-bg);
    border-bottom:2px solid var(--duo-card-border);
    padding:12px 20px;
    display:flex;align-items:center;gap:14px;
  }
  .top-bar .logo{font-weight:900;font-size:1.4rem;color:var(--duo-green);letter-spacing:-0.5px;white-space:nowrap}
  .top-bar .logo span{color:var(--duo-blue)}
  .progress-wrap{flex:1;height:20px;background:var(--duo-card);border-radius:999px;overflow:hidden;position:relative;border:2px solid var(--duo-card-border)}
  .progress-fill{height:100%;background:linear-gradient(90deg,var(--duo-green),var(--duo-blue));border-radius:999px;transition:width .6s cubic-bezier(.4,0,.2,1);position:relative}
  .progress-fill::after{content:'';position:absolute;top:2px;left:6px;right:6px;height:5px;background:rgba(255,255,255,.3);border-radius:999px}
  .progress-text{font-weight:800;font-size:.85rem;color:var(--duo-text-dim);white-space:nowrap}
  .hearts{display:flex;align-items:center;gap:4px;font-weight:800;color:var(--duo-red);font-size:1rem}
  .hearts svg{width:22px;height:22px;fill:var(--duo-red)}
  .xp-badge{background:var(--duo-yellow);color:#3a2e00;font-weight:800;font-size:.75rem;padding:4px 10px;border-radius:999px}

  /* ─── MAIN LAYOUT ─── */
  .app{max-width:680px;margin:0 auto;padding:24px 16px 100px}

  /* ─── SCREENS ─── */
  .screen{display:none;animation:fadeUp .4s ease}
  .screen.active{display:block}
  @keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

  /* ─── HOME SCREEN ─── */
  .hero{text-align:center;padding:40px 0 20px}
  .hero-icon{font-size:5rem;margin-bottom:8px;animation:bounce 2s infinite}
  @keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
  .hero h1{font-size:2rem;font-weight:900;margin-bottom:6px}
  .hero h1 span{color:var(--duo-green)}
  .hero p{color:var(--duo-text-dim);font-size:1.05rem;max-width:400px;margin:0 auto}

  .lesson-path{display:flex;flex-direction:column;align-items:center;gap:0;padding:30px 0;width:100%}
  .lesson-node{position:relative;display:flex;flex-direction:column;align-items:center;cursor:pointer;transition:transform .2s}
  .lesson-node:hover{transform:scale(1.05)}
  .lesson-circle{
    width:72px;height:72px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    font-size:1.8rem;font-weight:900;
    border:none;cursor:pointer;position:relative;
    transition:transform .15s,box-shadow .15s;
    color:#fff;
  }
  .lesson-circle.green{background:var(--duo-green);box-shadow:0 6px 0 var(--duo-green-dark)}
  .lesson-circle.blue{background:var(--duo-blue);box-shadow:0 6px 0 var(--duo-blue-dark)}
  .lesson-circle.purple{background:var(--duo-purple);box-shadow:0 6px 0 var(--duo-purple-dark)}
  .lesson-circle.orange{background:var(--duo-orange);box-shadow:0 6px 0 var(--duo-orange-dark)}
  .lesson-circle.locked{background:#4b5d67;box-shadow:0 6px 0 #3a484f;cursor:not-allowed;opacity:.6}
  .lesson-circle.green:active:not(.locked){transform:translateY(4px);box-shadow:0 2px 0 var(--duo-green-dark)}
  .lesson-circle.blue:active:not(.locked){transform:translateY(4px);box-shadow:0 2px 0 var(--duo-blue-dark)}
  .lesson-circle.purple:active:not(.locked){transform:translateY(4px);box-shadow:0 2px 0 var(--duo-purple-dark)}
  .lesson-circle.orange:active:not(.locked){transform:translateY(4px);box-shadow:0 2px 0 var(--duo-orange-dark)}
  .lesson-circle .lock-icon{font-size:1.6rem}
  .lesson-circle .check{font-size:1.8rem}
  .lesson-label{margin-top:10px;font-weight:700;font-size:.85rem;color:var(--duo-text-dim);text-align:center;max-width:120px}
  .connector{width:3px;height:36px;background:var(--duo-card-border);border-radius:999px}
  .lesson-node.completed .lesson-circle{background:var(--duo-green);box-shadow:0 6px 0 var(--duo-green-dark)}

  /* zigzag yolu düzenlemesi - her 4 düğüm için 8 elemanlı döngü */
  .lesson-node:nth-child(8n+1){align-self:center}
  .lesson-node:nth-child(8n+3){align-self:flex-end;margin-right:15%}
  .lesson-node:nth-child(8n+5){align-self:center}
  .lesson-node:nth-child(8n+7){align-self:flex-start;margin-left:15%}
  .connector-wrap{display:flex;justify-content:center;width:100%}

  /* ─── QUIZ SCREEN ─── */
  .quiz-container{animation:fadeUp .35s ease}
  .quiz-header{text-align:center;margin-bottom:8px}
  .quiz-header .lesson-title{font-size:1rem;font-weight:700;color:var(--duo-text-dim);margin-bottom:4px}
  .quiz-header .question-counter{font-size:.85rem;color:var(--duo-text-dim)}
  .quiz-progress{height:10px;background:var(--duo-card);border-radius:999px;margin:12px 0 28px;overflow:hidden;border:2px solid var(--duo-card-border)}
  .quiz-progress-fill{height:100%;background:var(--duo-green);border-radius:999px;transition:width .5s ease}

  .quiz-card{
    background:var(--duo-card);
    border:2px solid var(--duo-card-border);
    border-radius:var(--radius);
    padding:28px 24px;
    margin-bottom:20px;
  }
  .quiz-card .prompt{font-size:1.15rem;font-weight:800;margin-bottom:6px;line-height:1.4}
  .quiz-card .hint{color:var(--duo-text-dim);font-size:.9rem;margin-bottom:20px;line-height:1.5}
  .quiz-card .code-example{
    background:#0d1b22;border:2px solid var(--duo-card-border);border-radius:var(--radius-sm);
    padding:14px 18px;margin-bottom:20px;font-family:'Courier New',monospace;
    font-size:.95rem;color:var(--duo-green);line-height:1.6;overflow-x:auto;
  }

  .options{display:flex;flex-direction:column;gap:12px}
  .option-btn{
    background:var(--duo-card);
    border:2px solid var(--duo-card-border);
    border-radius:var(--radius-sm);
    padding:16px 20px;
    font-family:'Nunito',sans-serif;
    font-size:1rem;font-weight:700;
    color:var(--duo-text);
    cursor:pointer;
    transition:all .15s;
    text-align:left;
    position:relative;
    box-shadow:0 4px 0 #0e1a20;
  }
  .option-btn:hover{border-color:var(--duo-blue);background:#162a33}
  .option-btn:active{transform:translateY(3px);box-shadow:0 1px 0 #0e1a20}
  .option-btn.selected{border-color:var(--duo-blue);background:var(--duo-blue-light);color:#1a2e35;box-shadow:0 4px 0 var(--duo-blue-dark)}
  .option-btn.correct{border-color:var(--duo-green);background:var(--duo-green-light);color:#1a3a00;box-shadow:0 4px 0 var(--duo-green-dark);pointer-events:none}
  .option-btn.wrong{border-color:var(--duo-red);background:#ffe0e0;color:#5c0000;box-shadow:0 4px 0 var(--duo-red-dark);pointer-events:none;animation:shake .4s ease}
  @keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-6px)}40%,80%{transform:translateX(6px)}}

  /* ─── CTA BUTTON ─── */
  .btn-cta{
    display:block;width:100%;padding:16px;
    border:none;border-radius:var(--radius);
    font-family:'Nunito',sans-serif;font-size:1.1rem;font-weight:800;
    cursor:pointer;transition:all .15s;text-transform:uppercase;letter-spacing:.5px;
    color:#fff;
  }
  .btn-cta.green{background:var(--duo-green);box-shadow:0 6px 0 var(--duo-green-dark)}
  .btn-cta.green:hover{filter:brightness(1.05)}
  .btn-cta.green:active{transform:translateY(4px);box-shadow:0 2px 0 var(--duo-green-dark)}
  .btn-cta.blue{background:var(--duo-blue);box-shadow:0 6px 0 var(--duo-blue-dark)}
  .btn-cta.blue:active{transform:translateY(4px);box-shadow:0 2px 0 var(--duo-green-dark)}
  .btn-cta:disabled{background:#4b5d67;box-shadow:0 6px 0 #3a484f;cursor:not-allowed;opacity:.7}
  .btn-cta.green:disabled{background:#4b5d67;box-shadow:0 6px 0 #3a484f}

  /* ─── FEEDBACK OVERLAY ─── */
  .feedback-bar{
    position:fixed;bottom:0;left:0;right:0;
    padding:20px 24px;display:flex;align-items:center;justify-content:space-between;gap:16px;
    transform:translateY(100%);transition:transform .35s cubic-bezier(.4,0,.2,1);
    z-index:200;
  }
  .feedback-bar.show{transform:translateY(0)}
  .feedback-bar.correct-bar{background:#1a3d00;border-top:3px solid var(--duo-green)}
  .feedback-bar.wrong-bar{background:#3d0000;border-top:3px solid var(--duo-red)}
  .feedback-bar .fb-left{display:flex;align-items:center;gap:12px}
  .feedback-bar .fb-icon{font-size:2rem}
  .feedback-bar .fb-text{font-weight:800;font-size:1.1rem}
  .feedback-bar .fb-sub{font-weight:600;font-size:.85rem;opacity:.8;margin-top:2px}
  .feedback-bar .fb-btn{
    padding:12px 28px;border:none;border-radius:var(--radius-sm);
    font-family:'Nunito',sans-serif;font-size:1rem;font-weight:800;
    cursor:pointer;text-transform:uppercase;color:#fff;flex-shrink:0;
  }
  .correct-bar .fb-btn{background:var(--duo-green);box-shadow:0 4px 0 var(--duo-green-dark)}
  .wrong-bar .fb-btn{background:var(--duo-red);box-shadow:0 4px 0 var(--duo-red-dark)}
  .fb-btn:active{transform:translateY(3px);box-shadow:none}

  /* ─── RESULTS SCREEN ─── */
  .results{text-align:center;padding:50px 0}
  .results .trophy{font-size:5rem;margin-bottom:12px;animation:bounce 2s infinite}
  .results h2{font-size:1.8rem;font-weight:900;margin-bottom:6px}
  .results .sub{color:var(--duo-text-dim);font-size:1rem;margin-bottom:24px}
  .stats-row{display:flex;justify-content:center;gap:20px;margin-bottom:32px;flex-wrap:wrap}
  .stat-card{
    background:var(--duo-card);border:2px solid var(--duo-card-border);border-radius:var(--radius-sm);
    padding:16px 24px;min-width:100px;
  }
  .stat-card .stat-val{font-size:1.6rem;font-weight:900;color:var(--duo-green)}
  .stat-card .stat-val.red{color:var(--duo-red)}
  .stat-card .stat-lbl{font-size:.75rem;font-weight:700;color:var(--duo-text-dim);text-transform:uppercase;margin-top:4px}

  /* ─── CONFETTI ─── */
  .confetti-piece{
    position:fixed;z-index:300;width:10px;height:10px;border-radius:2px;
    animation:confettiFall 2.5s ease-in forwards;pointer-events:none;
  }
  @keyframes confettiFall{
    0%{transform:translateY(0) rotate(0);opacity:1}
    100%{transform:translateY(110vh) rotate(720deg);opacity:0}
  }

  /* ─── TOAST ─── */
  .toast{
    position:fixed;top:80px;left:50%;transform:translateX(-50%) translateY(-20px);
    background:var(--duo-green);color:#fff;padding:12px 24px;border-radius:var(--radius-sm);
    font-weight:800;font-size:.95rem;z-index:250;opacity:0;
    transition:all .3s ease;pointer-events:none;
    box-shadow:0 4px 20px rgba(0,0,0,.3);
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .toast.error{background:var(--duo-red)}

  /* ─── STREAK FLAME ─── */
  .streak-indicator{
    position:fixed;top:70px;right:20px;z-index:150;
    font-size:.85rem;font-weight:800;color:var(--duo-orange);
    display:flex;align-items:center;gap:4px;
    opacity:0;transition:opacity .3s;
  }
  .streak-indicator.show{opacity:1}

  /* ─── RESPONSIVE ─── */
  @media(max-width:500px){
    .top-bar{padding:10px 12px;gap:10px}
    .top-bar .logo{font-size:1.1rem}
    .progress-text{font-size:.75rem}
    .hero h1{font-size:1.5rem}
    .hero-icon{font-size:3.5rem}
    .quiz-card{padding:20px 16px}
    .quiz-card .prompt{font-size:1rem}
    .option-btn{padding:14px 16px;font-size:.95rem}
    .feedback-bar{flex-direction:column;text-align:center;gap:12px;padding:16px}
    .feedback-bar .fb-btn{width:100%}
    .stats-row{gap:12px}
    .stat-card{padding:12px 16px;min-width:80px}
    .lesson-node:nth-child(8n+3){margin-right:5%}
    .lesson-node:nth-child(8n+7){margin-left:5%}
    .lesson-circle{width:60px;height:60px;font-size:1.5rem}
  }

  /* ─── LEARN CARD INSIDE QUIZ ─── */
  .learn-card{
    background:linear-gradient(135deg,#0d2b1a,#0d1f2b);
    border:2px solid var(--duo-green);border-radius:var(--radius);
    padding:28px 24px;margin-bottom:24px;text-align:center;
  }
  .learn-card .tag-name{font-size:2.2rem;font-weight:900;color:var(--duo-green);font-family:'Courier New',monospace}
  .learn-card .tag-desc{color:var(--duo-text-dim);font-size:1rem;margin-top:8px;line-height:1.5}
  .learn-card .tag-example{
    background:#0a1a12;border:2px solid var(--duo-card-border);border-radius:var(--radius-sm);
    padding:14px;margin-top:16px;font-family:'Courier New',monospace;font-size:.9rem;
    color:var(--duo-blue);text-align:left;line-height:1.6;
  }

  /* XP gain animation */
  .xp-float{
    position:fixed;z-index:300;font-weight:900;font-size:1.2rem;color:var(--duo-yellow);
    pointer-events:none;animation:xpUp 1.2s ease-out forwards;
  }
  @keyframes xpUp{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-60px) scale(1.3)}}
</style>
</head>
<body>

<!-- Top Bar -->
<div class="top-bar">
  <div class="logo">HTML<span>Duo</span></div>
  <div class="progress-wrap">
    <div class="progress-fill" id="globalProgress" style="width:0%"></div>
  </div>
  <div class="progress-text" id="globalProgressText">0%</div>
  <div class="xp-badge" id="xpBadge">0 XP</div>
  <div class="hearts" id="heartsDisplay">
    <svg viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
    <span id="heartsCount">5</span>
  </div>
</div>

<!-- Streak Indicator -->
<div class="streak-indicator" id="streakIndicator">🔥 <span id="streakText">0</span> seri!</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- Feedback Bar -->
<div class="feedback-bar" id="feedbackBar">
  <div class="fb-left">
    <div class="fb-icon" id="fbIcon"></div>
    <div>
      <div class="fb-text" id="fbText"></div>
      <div class="fb-sub" id="fbSub"></div>
    </div>
  </div>
  <button class="fb-btn" id="fbBtn" onclick="handleContinue()">DEVAM ET</button>
</div>

<!-- APP -->
<div class="app">

  <!-- HOME SCREEN -->
  <div class="screen active" id="homeScreen">
    <div class="hero">
      <div class="hero-icon">🦉</div>
      <h1><span>HTML</span> Etiketlerini Öğren</h1>
      <p>Web'in temel taşlarını her seferinde bir dersle feth et!</p>
    </div>
    <div class="lesson-path" id="lessonPath"></div>
  </div>

  <!-- QUIZ SCREEN -->
  <div class="screen" id="quizScreen">
    <div class="quiz-container" id="quizContainer"></div>
  </div>

  <!-- RESULTS SCREEN -->
  <div class="screen" id="resultsScreen">
    <div class="results" id="resultsContent"></div>
  </div>

</div>

<script>
// ══════════════════════════════
// VERİ: Dersler & Sorular
// ══════════════════════════════
const LESSONS = [
  {
    id:1, title:"Başlıklar", icon:"📝", color:"green",
    learn:{tag:"&lt;h1&gt; – &lt;h6&gt;", desc:"Başlık etiketleri başlıkları ve alt başlıkları tanımlar. <code>&lt;h1&gt;</code> en büyük, <code>&lt;h6&gt;</code> en küçüktür.", example:"&lt;h1&gt;Hoşgeldiniz!&lt;/h1&gt;\n&lt;h2&gt;Hakkımızda&lt;/h2&gt;"},
    questions:[
      {prompt:"Hangi etiket EN BÜYÜK başlığı oluşturur?", options:["&lt;h6&gt;","&lt;h1&gt;","&lt;head&gt;","&lt;big&gt;"], correct:1, explain:"<h1> en üst düzey başlıktır — en büyük ve en kalın!"},
      {prompt:"HTML kaç tane başlık seviyesi sunar?", options:["4","5","6","8"], correct:2, explain:"HTML'de 6 başlık seviyesi vardır: <h1>'den <h6>'ya kadar."},
      {prompt:"Aşağıdaki kod ne üretir?<br><code>&lt;h3&gt;Merhaba&lt;/h3&gt;</code>", options:["Bir paragraf","Orta boy bir başlık","Bir link","Bir liste elemanı"], correct:1, explain:"<h3> orta düzey bir başlık oluşturur — <h1> ve <h2>'den küçüktür."},
    ]
  },
  {
    id:2, title:"Paragraflar", icon:"📄", color:"blue",
    learn:{tag:"&lt;p&gt;", desc:"Paragraf etiketi metin bloklarını sarmalar. Tarayıcılar otomatik olarak üstüne ve altına boşluk ekler.", example:"&lt;p&gt;HTML harika!&lt;/p&gt;\n&lt;p&gt;Öğrenmeye devam edelim.&lt;/p&gt;"},
    questions:[
      {prompt:"Metin paragrafı için hangi etiket kullanılır?", options:["&lt;para&gt;","&lt;text&gt;","&lt;p&gt;","&lt;pg&gt;"], correct:2, explain:"<p> paragraf etiketidir — basit ve temel!"},
      {prompt:"Arka arkaya iki &lt;p&gt; etiketi koyarsanız ne olur?", options:["Tek bir paragrafta birleşirler","Her biri aralarında boşluk olacak şekilde yeni satırda başlar","Aynı satırda görünürler","Hata oluşur"], correct:1, explain:"Her <p> etiketi aralarında boşluk olan ayrı bir blok oluşturur."},
      {prompt:"&lt;p&gt; bir inline mı yoksa block-level eleman mıdır?", options:["Inline","Block-level","Hiçbiri","Her ikisi"], correct:1, explain:"<p> block-level bir elemandır — mevcut tüm genişliği kaplar."},
    ]
  },
  {
    id:3, title:"Linkler", icon:"🔗", color:"purple",
    learn:{tag:"&lt;a&gt;", desc:"Anchor (çapa) etiketi tıklanabilir köprüler oluşturur. <code>href</code> özniteliği tarayıcıya nereye gideceğini söyler.", example:'&lt;a href="https://example.com"&gt;\n  Sitemi Ziyaret Et\n&lt;/a&gt;'},
    questions:[
      {prompt:"Hangi etiket bir köprü oluşturur?", options:["&lt;link&gt;","&lt;a&gt;","&lt;href&gt;","&lt;url&gt;"], correct:1, explain:"<a> (anchor) link etiketidir. <link> ise stil dosyaları içindir!"},
      {prompt:"Hangi öznitelik bağlantının hedef URL'sini belirtir?", options:["src","link","url","href"], correct:3, explain:'href, "Hypertext Reference" (Hiper Metin Referansı) anlamına gelir.'},
      {prompt:'<code>&lt;a href="#top"&gt;Yukarı Git&lt;/a&gt;</code> kodu ne yapar?', options:["Yeni bir sayfa açar","id=\'top\' olan elemana kaydırır","Bir başlık oluşturur","Hiçbir şey"], correct:1, explain:'Bir # linki, aynı sayfadaki o ID\'ye sahip elemana atlar.'},
    ]
  },
  {
    id:4, title:"Resimler", icon:"🖼️", color:"orange",
    learn:{tag:"&lt;img&gt;", desc:"Resim etiketi görselleri gömer. Kendi kendine kapanır! URL için <code>src</code>, metin açıklaması için <code>alt</code> kullanın.", example:'&lt;img src="fotograf.jpg" alt="Bir gün batımı" /&gt;'},
    questions:[
      {prompt:"Hangi etiket bir resim gösterir?", options:["&lt;pic&gt;","&lt;image&gt;","&lt;img&gt;","&lt;photo&gt;"], correct:2, explain:"<img> resim etiketidir — kısa ve öz!"},
      {prompt:"Hangi öznitelik resim dosyası yoludur?", options:["href","link","src","file"], correct:2, explain:'src (source - kaynak) resim dosyasının konumunu gösterir.'},
      {prompt:"<code>alt</code> özniteliği neden önemlidir?", options:["Resimleri büyütür","Resmin yüklenmesi için gereklidir","Ekran okuyucular ve yüklenemeyen resimler için metin sağlar","Kenarlık ekler"], correct:2, explain:"alt metni, erişilebilirlik ve resimler yüklenemediğinde kritiktir."},
    ]
  },
  {
    id:5, title:"Listeler", icon:"📋", color:"green",
    learn:{tag:"&lt;ul&gt; &lt;ol&gt; &lt;li&gt;", desc:"<code>&lt;ul&gt;</code> maddeli listeler, <code>&lt;ol&gt;</code> numaralı listeler oluşturur. Her öğe <code>&lt;li&gt;</code> kullanır.", example:"&lt;ul&gt;\n  &lt;li&gt;HTML&lt;/li&gt;\n  &lt;li&gt;CSS&lt;/li&gt;\n  &lt;li&gt;JavaScript&lt;/li&gt;\n&lt;/ul&gt;"},
    questions:[
      {prompt:"Hangi etiket maddeli (sırasız) bir liste oluşturur?", options:["&lt;ol&gt;","&lt;list&gt;","&lt;ul&gt;","&lt;bl&gt;"], correct:2, explain:"<ul>, Unordered List (Sırasız Liste) demektir — numaralar değil, maddeler!"},
      {prompt:"Her bir liste öğesini hangi etiket sarmalar?", options:["&lt;item&gt;","&lt;li&gt;","&lt;il&gt;","&lt;list&gt;"], correct:1, explain:"<li>, List Item (Liste Öğesi) demektir."},
      {prompt:"&lt;ul&gt; ve &lt;ol&gt; arasındaki fark nedir?", options:["Fark yoktur","ul = numaralı, ol = maddeli","ul = maddeli, ol = numaralı","ul linkler için, ol metin için"], correct:2, explain:"<ul> = Sırasız (maddeler), <ol> = Sıralı (numaralar)."},
    ]
  },
  {
    id:6, title:"Divler & Spanlar", icon:"📦", color:"blue",
    learn:{tag:"&lt;div&gt; &lt;span&gt;", desc:"<code>&lt;div&gt;</code> elemanları gruplamak için bir block kapsayıcıdır. <code>&lt;span&gt;</code> ise küçük metin parçalarını stillendirmek için bir inline kapsayıcıdır.", example:'&lt;div class="kart"&gt;\n  &lt;p&gt;Merhaba &lt;span style="color:red"&gt;Dünya&lt;/span&gt;&lt;/p&gt;\n&lt;/div&gt;'},
    questions:[
      {prompt:"Hangi etiket genel bir BLOCK-level kapsayıcıdır?", options:["&lt;span&gt;","&lt;section&gt;","&lt;div&gt;","&lt;container&gt;"], correct:2, explain:"<div>, HTML\'deki en yaygın block-level kapsayıcıdır."},
      {prompt:"Küçük bir INLINE metin parçasını stillendirmek için hangisi kullanılır?", options:["&lt;div&gt;","&lt;span&gt;","&lt;text&gt;","&lt;inline&gt;"], correct:1, explain:"<span>, inline içeriği hedeflemek için kullanılır."},
      {prompt:"Bir &lt;div&gt; içine başka bir &lt;div&gt; koyabilir misiniz?", options:["Hayır, geçersizdir","Evet, divleri iç içe koymak yaygındır","Sadece özel özniteliklerle","Sadece HTML5\'te"], correct:1, explain:"Divleri iç içe koymak (nesting) tamamen geçerli ve düzenler için çok yaygındır."},
    ]
  },
];

// ══════════════════════════════
// DURUM
// ══════════════════════════════
let state = {
  currentLesson: null,
  currentQuestion: 0,
  score: 0,
  totalXP: 0,
  hearts: 5,
  streak: 0,
  lessonsCompleted: [],
  phase: 'home', // home | learn | quiz | results
  answered: false,
  lessonCorrect: 0,
  lessonWrong: 0,
};

// Kaydedilmiş durumu yükle
try {
  const saved = localStorage.getItem('htmlduo_state');
  if (saved) {
    const s = JSON.parse(saved);
    state.totalXP = s.totalXP || 0;
    state.hearts = s.hearts != null ? s.hearts : 5;
    state.streak = s.streak || 0;
    state.lessonsCompleted = s.lessonsCompleted || [];
  }
} catch(e){}

function saveState() {
  try {
    localStorage.setItem('htmlduo_state', JSON.stringify({
      totalXP: state.totalXP,
      hearts: state.hearts,
      streak: state.streak,
      lessonsCompleted: state.lessonsCompleted,
    }));
  } catch(e){}
}

// ══════════════════════════
// UI YARDIMCILARI
// ══════════════════════════
const $ = id => document.getElementById(id);

function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  $(name + 'Screen').classList.add('active');
}

function updateGlobalProgress() {
  const pct = Math.round((state.lessonsCompleted.length / LESSONS.length) * 100);
  $('globalProgress').style.width = pct + '%';
  $('globalProgressText').textContent = pct + '%';
  $('xpBadge').textContent = state.totalXP + ' XP';
  $('heartsCount').textContent = state.hearts;
  const si = $('streakIndicator');
  if (state.streak >= 2) { si.classList.add('show'); $('streakText').textContent = state.streak; }
  else si.classList.remove('show');
}

function showToast(msg, isError) {
  const t = $('toast');
  t.textContent = msg;
  t.className = 'toast show' + (isError ? ' error' : '');
  setTimeout(() => t.classList.remove('show'), 2000);
}

function floatXP(amount) {
  const el = document.createElement('div');
  el.className = 'xp-float';
  el.textContent = '+' + amount + ' XP';
  el.style.left = (Math.random() * 60 + 20) + '%';
  el.style.top = '40%';
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 1300);
}

function spawnConfetti() {
  const colors = ['#58cc02','#1cb0f6','#ce82ff','#ff9600','#ffc800','#ff4b4b'];
  for (let i = 0; i < 50; i++) {
    const c = document.createElement('div');
    c.className = 'confetti-piece';
    c.style.left = Math.random() * 100 + 'vw';
    c.style.top = '-10px';
    c.style.background = colors[Math.floor(Math.random()*colors.length)];
    c.style.animationDelay = (Math.random()*1.2) + 's';
    c.style.animationDuration = (2 + Math.random()*1.5) + 's';
    c.style.width = (6+Math.random()*8)+'px';
    c.style.height = (6+Math.random()*8)+'px';
    c.style.borderRadius = Math.random()>.5?'50%':'2px';
    document.body.appendChild(c);
    setTimeout(() => c.remove(), 4000);
  }
}

// ══════════════════════════
// ANA EKRAN — DERS YOLU
// ══════════════════════════
function renderHome() {
  const path = $('lessonPath');
  path.innerHTML = '';
  LESSONS.forEach((lesson, i) => {
    const completed = state.lessonsCompleted.includes(lesson.id);
    const unlocked = i === 0 || state.lessonsCompleted.includes(LESSONS[i-1].id);

    if (i > 0) {
      const cw = document.createElement('div');
      cw.className = 'connector-wrap';
      cw.innerHTML = '<div class="connector"></div>';
      path.appendChild(cw);
    }

    const node = document.createElement('div');
    node.className = 'lesson-node' + (completed ? ' completed' : '');
    node.innerHTML = `
      <button class="lesson-circle ${completed ? 'green' : unlocked ? lesson.color : 'locked'}"
              ${!unlocked ? 'disabled' : ''} aria-label="${lesson.title}">
        ${completed ? '<span class="check">✓</span>' : unlocked ? lesson.icon : '<span class="lock-icon">🔒</span>'}
      </button>
      <div class="lesson-label">${lesson.title}</div>
    `;
    if (unlocked) {
      node.addEventListener('click', () => startLesson(lesson));
    }
    path.appendChild(node);
  });
  updateGlobalProgress();
}

// ══════════════════════════
// DERSİ BAŞLAT
// ══════════════════════════
function startLesson(lesson) {
  if (state.hearts <= 0) {
    showToast('Canın kalmadı! Bekle veya yenile.', true);
    state.hearts = 5;
    saveState();
    updateGlobalProgress();
    return;
  }
  state.currentLesson = lesson;
  state.currentQuestion = -1; // -1 = learn phase
  state.lessonCorrect = 0;
  state.lessonWrong = 0;
  state.answered = false;
  state.phase = 'learn';
  showScreen('quiz');
  renderQuiz();
}

// ══════════════════════════
// TEST / ÖĞRENME EKRANI
// ══════════════════════════
function renderQuiz() {
  const lesson = state.currentLesson;
  const qc = $('quizContainer');
  hideFeedback();

  if (state.currentQuestion === -1) {
    // Öğrenme aşaması
    const l = lesson.learn;
    qc.innerHTML = `
      <div class="quiz-header">
        <div class="lesson-title">${lesson.icon} ${lesson.title}</div>
      </div>
      <div class="quiz-progress"><div class="quiz-progress-fill" style="width:0%"></div></div>
      <div class="learn-card">
        <div class="tag-name">${l.tag}</div>
        <div class="tag-desc">${l.desc}</div>
        <div class="tag-example">${l.example}</div>
      </div>
      <button class="btn-cta green" onclick="advanceQuestion()">ANLADIM — HAYDİ PRATİK YAPALIM!</button>
    `;
    return;
  }

  const qi = state.currentQuestion;
  const q = lesson.questions[qi];
  const total = lesson.questions.length;
  const pct = Math.round(((qi) / total) * 100);

  let optionsHTML = q.options.map((o, i) =>
    `<button class="option-btn" data-idx="${i}" onclick="selectOption(${i})">${o}</button>`
  ).join('');

  qc.innerHTML = `
    <div class="quiz-header">
      <div class="lesson-title">${lesson.icon} ${lesson.title}</div>
      <div class="question-counter">Soru ${qi+1} / ${total}</div>
    </div>
    <div class="quiz-progress"><div class="quiz-progress-fill" style="width:${pct}%"></div></div>
    <div class="quiz-card">
      <div class="prompt">${q.prompt}</div>
      ${q.hint ? '<div class="hint">' + q.hint + '</div>' : ''}
      <div class="options">${optionsHTML}</div>
    </div>
    <button class="btn-cta green" id="checkBtn" disabled onclick="checkAnswer()">KONTROL ET</button>
  `;
  state.answered = false;
  state.selectedOption = null;
}

// ══════════════════════════
// SEÇENEK SEÇİMİ
// ══════════════════════════
let selectedIdx = null;
function selectOption(idx) {
  if (state.answered) return;
  selectedIdx = idx;
  document.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
  document.querySelector(`.option-btn[data-idx="${idx}"]`).classList.add('selected');
  $('checkBtn').disabled = false;
}

// ══════════════════════════
// CEVABI KONTROL ET
// ══════════════════════════
function checkAnswer() {
  if (state.answered || selectedIdx === null) return;
  state.answered = true;
  const q = state.currentLesson.questions[state.currentQuestion];
  const correct = selectedIdx === q.correct;

  document.querySelectorAll('.option-btn').forEach(b => {
    b.style.pointerEvents = 'none';
    const i = parseInt(b.dataset.idx);
    if (i === q.correct) b.classList.add('correct');
    else if (i === selectedIdx && !correct) b.classList.add('wrong');
  });

  $('checkBtn').style.display = 'none';

  if (correct) {
    state.lessonCorrect++;
    state.streak++;
    const xp = state.streak >= 3 ? 15 : 10;
    state.totalXP += xp;
    floatXP(xp);
    showFeedback(true, q.explain);
  } else {
    state.lessonWrong++;
    state.streak = 0;
    state.hearts = Math.max(0, state.hearts - 1);
    showFeedback(false, q.explain);
  }
  updateGlobalProgress();
  saveState();
}

// ══════════════════════════
// GERİ BİLDİRİM CUBUĞU
// ══════════════════════════
const correctPhrases = ["Harika! 🎉","Tam isabet! 🔥","Süper gidiyorsun! 💪","Muhteşem! ⭐","Doğru! ✅","Böyle devam et! 🚀","Harika iş! 🏆"];
const wrongPhrases = ["Pek değil! 😅","Devam et! 💪","Neredeyse oldu! 🤔","Vazgeçme! 🙏","Hadi be! 😬","Bunu hatırlamaya çalış! 📝"];

function showFeedback(correct, explain) {
  const bar = $('feedbackBar');
  bar.className = 'feedback-bar show ' + (correct ? 'correct-bar' : 'wrong-bar');
  $('fbIcon').textContent = correct ? '🎉' : '😢';
  $('fbText').textContent = correct
    ? correctPhrases[Math.floor(Math.random()*correctPhrases.length)]
    : wrongPhrases[Math.floor(Math.random()*wrongPhrases.length)];
  $('fbSub').textContent = explain || '';
}

function hideFeedback() {
  $('feedbackBar').className = 'feedback-bar';
}

// ══════════════════════════
// DEVAM ET / İLERLE
// ══════════════════════════
function handleContinue() {
  advanceQuestion();
}

function advanceQuestion() {
  hideFeedback();
  selectedIdx = null;
  const lesson = state.currentLesson;
  state.currentQuestion++;
  if (state.currentQuestion >= lesson.questions.length) {
    finishLesson();
  } else {
    renderQuiz();
  }
}

// ══════════════════════════
// DERSİ BİTİR
// ══════════════════════════
function finishLesson() {
  const lesson = state.currentLesson;
  if (!state.lessonsCompleted.includes(lesson.id)) {
    state.lessonsCompleted.push(lesson.id);
  }
  const bonus = state.lessonWrong === 0 ? 25 : 0;
  if (bonus) { state.totalXP += bonus; floatXP(bonus); }
  saveState();
  updateGlobalProgress();

  const allDone = state.lessonsCompleted.length === LESSONS.length;

  $('resultsContent').innerHTML = `
    <div class="trophy">${allDone ? '👑' : '🎉'}</div>
    <h2>${allDone ? 'Kurs Tamamlandı!' : 'Ders Tamamlandı!'}</h2>
    <div class="sub">${lesson.icon} ${lesson.title}${allDone ? ' — Tüm dersleri bitirdin!' : ''}</div>
    <div class="stats-row">
      <div class="stat-card"><div class="stat-val">${state.lessonCorrect}</div><div class="stat-lbl">Doğru</div></div>
      <div class="stat-card"><div class="stat-val red">${state.lessonWrong}</div><div class="stat-lbl">Hata</div></div>
      <div class="stat-card"><div class="stat-val">${state.totalXP}</div><div class="stat-lbl">Toplam XP</div></div>
      ${bonus ? '<div class="stat-card"><div class="stat-val">+' + bonus + '</div><div class="stat-lbl">Kusursuz Bonus</div></div>' : ''}
    </div>
    <button class="btn-cta green" onclick="goHome()" style="max-width:320px;margin:0 auto">${allDone ? 'ANA SAYFAYA DÖN 👑' : 'ÖĞRENMEYE DEVAM ET →'}</button>
  `;
  showScreen('results');
  spawnConfetti();
}

function goHome() {
  state.phase = 'home';
  showScreen('home');
  renderHome();
}

// ════════════════
// BAŞLAT
// ════════════════
renderHome();
</script>
</body>
