<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Öğreniyorum</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            line-height: 1.6;
            margin: 20px;
            background-color: #f4f4f4;
        }
        .container {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        h1 {
            color: #333;
        }
        code {
            background: #eee;
            padding: 2px 5px;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Merhaba! HTML Öğrenmeye Hoşgeldin</h1>
        <p>Bu dosya, HTML'in temel yapısını göstermek için Jarvis tarafından oluşturuldu.</p>
        
        <h2>Temel Etiketler:</h2>
        <ul>
            <li><code>&lt;h1&gt;</code>: En büyük başlık</li>
            <li><code>&lt;p&gt;</code>: Paragraf</li>
            <li><code>&lt;ul&gt;</code> ve <code>&lt;li&gt;</code>: Liste elemanları</li>
        </ul>

        <p>Kendi anketini oluşturmak için bu yapıyı kullanabilirsin!</p>
    </div>
</body>
</html>
